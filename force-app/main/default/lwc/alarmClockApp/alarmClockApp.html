<template>
  <div class="alarm-card">
    <h1>Alarm Clock App</h1>
    <img src={clockImage} alt="Alarm Clock Image" height="200px" width="200px">
    <h2>Current time will come here</h2>
    <div class="slds-grid slds-gutters">
    <!-- Section: Hours, Min, Sec-->
      <div class="slds-col">
        <span>Hours</span>
      </div>
      <div class="slds-col">
        <span>Minutes</span>
      </div>
      <div class="slds-col">
        <span>AM/PM</span>
      </div>
    </div>
    <button class="slds-button slds-button_neutral slds-button_stretch">Set Alarm</button>
  </div>
</template>
