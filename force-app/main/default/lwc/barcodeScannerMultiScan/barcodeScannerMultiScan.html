<!-- barcodeScannerMultiScan.html -->
<template>
  <div class="app">
    <div class="box">
      <div class="mtrlogo">
        <img src="/sfsites/c/resource/mtrlogosvg" alt="Metro Logo" height="30" width="130" />
      </div>
      <!-- After a barcode is successfully scanned, 
          its value is displayed here: -->
      <template lwc:if={scannedBarcode}>
          <div class="scanresult">
              Scanned barcode value is:
              <span class="slds-text-heading_small">{scannedBarcode}</span>
          </div>
      </template>

      <div class="headmktbtnsvg">
        <div class="scanhead">
          <h1>Card Scanner</h1>
        </div>
        <img src="/sfsites/c/resource/metromkt" alt="Metro Market Hall" height="219" width="400" />
             <!-- The click-to-scan button;
          Disabled if BarcodeScanner isn't available -->
        <div class="scanbtn">
            <lightning-button
                variant="brand"
                class="slds-var-m-left_x-small"
                disabled={scanButtonDisabled}
                icon-name="utility:scan"
                label="Scan Card"
                title="Open a camera view and look for a barcode to scan"
                onclick={handleBeginScanClick}>
            </lightning-button>
        </div> 
      </div>

      <!-- Static help text -->
      <div class="scandesc">
          Click <strong>Scan Card</strong> to open a card scanner camera view. Position a
          card in the scanner view to scan it.
      </div>
    </div>
  </div>
</template>
