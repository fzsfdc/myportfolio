<template>
  <div class="app slds-var-p-around_medium">
    <div class="box">
      <h1>BMI Calculator</h1>

      <template if:true={result}>
      <section>
        <h2>Your BMI Value is:</h2>
        <div class="result-value">{bmiValue}</div>
        <h2>Your category is:</h2>
        <div class="result-value">{result}</div>
        <button class="slds-button slds-button_neutral slds-button_stretch custom-button slds-var-m-bottom_large slds-var-m-top_large" onclick={recalculate}>Recalculate</button>
      </section>
      </template>
      <template if:false={result}>
      <form onsubmit={submitHandler}>
        <div class="slds-form-element slds-var-m-bottom_medium">
          <label class="slds-form-element__label slds-text-title_bold" for="text-input-height">Height (cm)</label>
          <div class="slds-form-element__control">
            <input type="number" id="text-input-height" name="height" value={height} min="0" placeholder="Enter your height in cm..." required class="slds-input" onchange={inputHandler} />
          </div>
        </div>
        <div class="slds-form-element slds-var-m-bottom_medium">
          <label class="slds-form-element__label slds-text-title_bold" for="text-input-weight">Weight (kg)</label>
          <div class="slds-form-element__control">
            <input type="number" id="text-input-weight" name="weight" value={weight} min="0" placeholder="Enter your weight in kg..." required class="slds-input" onchange={inputHandler} />
          </div>
        </div>
        <button class="slds-button slds-button_neutral slds-button_stretch custom-button slds-var-m-bottom_large">Calculate</button>
      </form> 
      </template>
      
      <div class="info-wrapper">
        <h2>What your BMI means</h2>
        <p class="slds-var-m-bottom_medium">Your BMI is a measure of your body fat based on your height and weight.</p>
        <h3 class="slds-text-color_error slds-text-heading_medium">Under 18.5</h3>
        <p class="slds-var-m-bottom_medium">Your are underweight and possibly malnourished.</p>
        <h3 class="slds-text-color_success slds-text-heading_medium">Between 18.5 to 24.9</h3>
        <p class="slds-var-m-bottom_medium">You have a healthy weight range for yourn and middle-aged adults.</p>
        <h3 class="slds-text-color_error slds-text-heading_medium">Above 25.0 to 29.9</h3>
        <p class="slds-var-m-bottom_medium">You are overweight and possibly at risk of health problems.</p>
        <h3 class="slds-text-color_error slds-text-heading_medium">Above 30.0</h3>
        <p class="slds-var-m-bottom_medium">Your are obese. Please consult your doctor to check your condition and get recommendations.</p>
      </div>
    </div>
  </div>
</template>
